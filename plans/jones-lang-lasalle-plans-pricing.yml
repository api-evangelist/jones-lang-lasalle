notes: Jones Lang LaSalle (JLL) does not publish a public-facing developer API program with
  tiered pricing. Integration surfaces (work orders, asset management, facility data exchange)
  are delivered through bilateral client and partner agreements, often via JLL Technologies
  products such as JLL Azara and JLL Jet. Reconciliation blocked pending public pricing.
