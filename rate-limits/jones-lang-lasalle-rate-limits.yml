specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Jones Lang LaSalle
providerId: jones-lang-lasalle
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
notes: JLL does not publish public rate-limit documentation. Limits, where applied, are
  enforced inside JLL Technologies product runtimes (Azara, Jet, etc.) and governed by the
  client / partner contract. Reconciliation blocked pending public documentation.
tags:
  - Commercial Real Estate
  - Facility Management
  - Asset Management
  - Work Orders
  - Rate Limiting
description: Rate-limit artifact for JLL integration surfaces. No public per-second / per-minute
  limits are documented; runtime throttling is contract- and product-defined.
sources:
  - https://www.jll.com/
  - https://www.jllt.com/
responseCodes:
  throttled: 429
  serviceUnavailable: 503
limits:
  - name: Contract-defined throttle
    scope: client-contract
    metric: varies
    limit: see JLL Technologies product documentation / client contract
policies:
  - name: Backoff Strategy
    description: Clients should implement exponential backoff with jitter on 429 / 503 responses
      and honor the Retry-After header when present.
  - name: Product-Provisioned Limits
    description: Where rate limits exist, they are enforced inside the relevant JLL Technologies
      product runtime; raises are requested through the JLL account team.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
