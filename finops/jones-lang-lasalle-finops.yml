specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
provider: Jones Lang LaSalle
providerId: jones-lang-lasalle
publisherName: Jones Lang LaSalle IP, Inc.
serviceCategory: Commercial Real Estate / Facility Management
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
notes: JLL does not expose a public usage-billing surface. FinOps shape inferred from a
  service-firm + technology-product hybrid model (advisory + JLL Technologies subscriptions).
  Meters reflect plausible product line items (work orders, asset records).
tags:
  - Commercial Real Estate
  - Facility Management
  - Asset Management
  - Work Orders
  - FinOps
  - FOCUS
description: FOCUS-aligned FinOps scaffold for JLL integration surfaces. Treated as a hybrid
  professional-services + technology-subscription model with no first-party billing API.
sources:
  - https://www.jll.com/
  - https://www.jllt.com/
  - https://www.finops.org/framework/
  - https://focus.finops.org/focus-specification/v1-3/
billingModel:
  pricingCategory: Subscription + Services
  billingFrequency: Per-Contract
  billingCurrency: USD
  chargeCategories:
    - Purchase
    - Usage
    - Adjustment
focusColumns:
  ServiceName: JLL Integration APIs
  ServiceCategory: Commercial Real Estate / Facility Management
  ProviderName: Jones Lang LaSalle
  PublisherName: Jones Lang LaSalle IP, Inc.
  InvoiceIssuerName: Jones Lang LaSalle IP, Inc.
  BillingCurrency: USD
meters:
  - name: api_requests
    unit: request
    aggregation: sum
    dimensions:
      - product
      - client
      - integration
  - name: work_orders
    unit: work_order
    aggregation: count
    dimensions:
      - portfolio
      - property
  - name: asset_records
    unit: record
    aggregation: count
    dimensions:
      - portfolio
      - property
principles:
  - name: Visibility
    description: Track integration usage at the JLL Technologies product level; instrument
      consumer-side calls since JLL does not publish a usage-billing API.
  - name: Allocation
    description: Allocate spend by portfolio / property / client engagement to mirror how
      JLL contracts are scoped.
  - name: Optimization
    description: Reconcile work-order and asset-record volumes against subscription tiers;
      use bulk export interfaces where contracts allow.
  - name: Accountability
    description: Each engagement has a JLL account team and an internal real-estate / FM
      product owner who jointly own integration cost.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
