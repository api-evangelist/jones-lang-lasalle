naftiko: 1.0.0-alpha2
info:
  label: JLL Corrigo Enterprise REST API
  description: The JLL Corrigo Enterprise REST API provides programmatic access to JLL Technologies' cloud-based facility
    management platform. The API enables integration with work order management, asset tracking, procurement, billing, and
    vendor management systems.
  tags:
  - Jones
  - Lang
  - Lasalle
  - API
  created: '2026-05-06'
  modified: '2026-05-06'
capability:
  consumes:
  - type: http
    namespace: jones-lang-lasalle
    baseUri: https://am-ce98c.corrigo.com/api/v1
    description: JLL Corrigo Enterprise REST API HTTP API.
    authentication:
      type: bearer
      token: '{{JONES_LANG_LASALLE_TOKEN}}'
    resources:
    - name: query-workorder
      path: /query/WorkOrder
      operations:
      - name: queryworkorders
        method: POST
        description: Query work orders
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: command-workorder
      path: /command/WorkOrder
      operations:
      - name: createworkorder
        method: POST
        description: Create a work order
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: query-asset
      path: /query/Asset
      operations:
      - name: queryassets
        method: POST
        description: Query assets
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: query-contact
      path: /query/Contact
      operations:
      - name: querycontacts
        method: POST
        description: Query contacts
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: query-location
      path: /query/Location
      operations:
      - name: querylocations
        method: POST
        description: Query locations
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    port: 8080
    namespace: jones-lang-lasalle-rest
    description: REST adapter for JLL Corrigo Enterprise REST API.
    resources:
    - path: /query/WorkOrder
      name: queryworkorders
      operations:
      - method: POST
        name: queryworkorders
        description: Query work orders
        call: jones-lang-lasalle.queryworkorders
        outputParameters:
        - type: object
          mapping: $.
    - path: /command/WorkOrder
      name: createworkorder
      operations:
      - method: POST
        name: createworkorder
        description: Create a work order
        call: jones-lang-lasalle.createworkorder
        outputParameters:
        - type: object
          mapping: $.
    - path: /query/Asset
      name: queryassets
      operations:
      - method: POST
        name: queryassets
        description: Query assets
        call: jones-lang-lasalle.queryassets
        outputParameters:
        - type: object
          mapping: $.
    - path: /query/Contact
      name: querycontacts
      operations:
      - method: POST
        name: querycontacts
        description: Query contacts
        call: jones-lang-lasalle.querycontacts
        outputParameters:
        - type: object
          mapping: $.
    - path: /query/Location
      name: querylocations
      operations:
      - method: POST
        name: querylocations
        description: Query locations
        call: jones-lang-lasalle.querylocations
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    port: 9090
    namespace: jones-lang-lasalle-mcp
    transport: http
    description: MCP adapter for JLL Corrigo Enterprise REST API for AI agent use.
    tools:
    - name: queryworkorders
      description: Query work orders
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: jones-lang-lasalle.queryworkorders
      outputParameters:
      - type: object
        mapping: $.
    - name: createworkorder
      description: Create a work order
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: jones-lang-lasalle.createworkorder
      outputParameters:
      - type: object
        mapping: $.
    - name: queryassets
      description: Query assets
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: jones-lang-lasalle.queryassets
      outputParameters:
      - type: object
        mapping: $.
    - name: querycontacts
      description: Query contacts
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: jones-lang-lasalle.querycontacts
      outputParameters:
      - type: object
        mapping: $.
    - name: querylocations
      description: Query locations
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: jones-lang-lasalle.querylocations
      outputParameters:
      - type: object
        mapping: $.
binds:
- namespace: env
  keys:
    JONES_LANG_LASALLE_TOKEN: JONES_LANG_LASALLE_TOKEN
