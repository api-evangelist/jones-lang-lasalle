naftiko: 1.0.0-alpha2
info:
  label: JLL Corrigo Enterprise REST API — Assets
  description: 'JLL Corrigo Enterprise REST API — Assets. 1 operations. Lead operation: Query assets. Self-contained Naftiko
    capability covering one Jones Lang Lasalle business surface.'
  tags:
  - Jones Lang Lasalle
  - Assets
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    JONES_LANG_LASALLE_API_KEY: JONES_LANG_LASALLE_API_KEY
capability:
  consumes:
  - type: http
    namespace: corrigo-rest-assets
    baseUri: https://am-ce98c.corrigo.com/api/v1
    description: JLL Corrigo Enterprise REST API — Assets business capability. Self-contained, no shared references.
    resources:
    - name: query-Asset
      path: /query/Asset
      operations:
      - name: queryassets
        method: POST
        description: Query assets
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.JONES_LANG_LASALLE_API_KEY}}'
  exposes:
  - type: rest
    namespace: corrigo-rest-assets-rest
    port: 8080
    description: REST adapter for JLL Corrigo Enterprise REST API — Assets. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/query/asset
      name: query-asset
      description: REST surface for query-Asset.
      operations:
      - method: POST
        name: queryassets
        description: Query assets
        call: corrigo-rest-assets.queryassets
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: corrigo-rest-assets-mcp
    port: 9090
    transport: http
    description: MCP adapter for JLL Corrigo Enterprise REST API — Assets. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: query-assets
      description: Query assets
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: corrigo-rest-assets.queryassets
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
